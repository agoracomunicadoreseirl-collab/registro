<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registro de Pagos</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 12px;
      background: #f5f5f5;
      color: #222;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      font-size: 20px;
      margin: 0 0 12px;
    }

    .filters,
    .quick-filters,
    .summary {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .filters {
      grid-template-columns: 1fr;
    }

    .quick-filters {
      grid-template-columns: repeat(3, 1fr);
    }

    .summary {
      grid-template-columns: 1fr;
    }

    .filter-item label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }

    button,
    input,
    select,
    textarea {
      font-size: 16px;
      padding: 10px;
      width: 100%;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 0;
    }

    button {
      cursor: pointer;
    }

    .box {
      background: #fff;
      border: 1px solid #ddd;
      padding: 12px;
    }

    .box-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .box-value {
      font-size: 22px;
      font-weight: bold;
    }

    .status {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    .table-wrap {
      overflow: visible;
      background: transparent;
      border: none;
    }

    table,
    tbody,
    tr,
    td {
      display: block;
      width: 100%;
    }

    table {
      min-width: 100%;
      border-collapse: collapse;
    }

    thead {
      display: none;
    }

    tr {
      background: #fff;
      border: 1px solid #ddd;
      margin-bottom: 12px;
      padding: 6px 0;
    }

    td {
      border: none;
      border-bottom: 1px solid #f0f0f0;
      padding: 8px 10px 8px 42%;
      position: relative;
      min-height: 20px;
      word-break: break-word;
      font-size: 14px;
    }

    td:last-child {
      border-bottom: none;
    }

    td::before {
      content: attr(data-label);
      position: absolute;
      left: 10px;
      top: 8px;
      width: 36%;
      font-weight: bold;
      color: #666;
    }

    .badge-ingreso {
      color: green;
      font-weight: bold;
    }

    .badge-egreso {
      color: #b00020;
      font-weight: bold;
    }

    .empty-row {
      background: #fff;
      border: 1px solid #ddd;
      padding: 12px;
      font-size: 14px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .4);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 12px;
      z-index: 1000;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 460px;
      background: #fff;
      padding: 16px;
      border: 1px solid #ccc;
      max-height: 92vh;
      overflow-y: auto;
    }

    .form-group {
      margin-bottom: 10px;
    }

    .form-group label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    .actions {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    @media (min-width: 701px) {
      body {
        padding: 16px;
      }

      h1 {
        font-size: 22px;
      }

      .filters {
        grid-template-columns: 140px 1fr 180px 180px 180px;
        align-items: end;
      }

      .summary {
        grid-template-columns: repeat(3, 1fr);
      }

      .actions {
        display: flex;
        justify-content: flex-end;
      }

      .table-wrap {
        overflow-x: auto;
        background: #fff;
        border: 1px solid #ddd;
      }

      table {
        width: 100%;
        min-width: 980px;
        display: table;
      }

      thead {
        display: table-header-group;
      }

      tbody {
        display: table-row-group;
      }

      tr {
        display: table-row;
        background: transparent;
        border: none;
        margin-bottom: 0;
        padding: 0;
      }

      th,
      td {
        display: table-cell;
        width: auto;
        position: static;
        padding: 10px;
        border-bottom: 1px solid #e5e5e5;
        text-align: left;
        vertical-align: top;
      }

      th {
        background: #fafafa;
        font-size: 14px;
      }

      td::before {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Registro de Pagos</h1>

    <div class="quick-filters">
      <button type="button" id="btnHoy">Hoy</button>
      <button type="button" id="btn7Dias">7 días</button>
      <button type="button" id="btnTodo">Todo</button>
    </div>

    <div class="filters">
      <div class="filter-item">
        <label>&nbsp;</label>
        <button id="openModalBtn" type="button">Agregar</button>
      </div>

      <div class="filter-item">
        <label for="clienteFiltro">Cliente</label>
        <input id="clienteFiltro" type="text" placeholder="Buscar cliente" list="clientesListFiltro" autocomplete="off">
        <datalist id="clientesListFiltro"></datalist>
      </div>

      <div class="filter-item">
        <label for="tipoFiltro">Tipo</label>
        <select id="tipoFiltro">
          <option value="">Todos los tipos</option>
          <option value="Ingreso">Ingreso</option>
          <option value="Egreso">Egreso</option>
        </select>
      </div>

      <div class="filter-item">
        <label for="fechaInicioFiltro">Fecha inicio</label>
        <input id="fechaInicioFiltro" type="date">
      </div>

      <div class="filter-item">
        <label for="fechaFinFiltro">Fecha fin</label>
        <input id="fechaFinFiltro" type="date">
      </div>
    </div>

    <div class="summary">
      <div class="box">
        <div class="box-title">Total ingresos</div>
        <div class="box-value" id="totalIngresos">0.00</div>
      </div>
      <div class="box">
        <div class="box-title">Total egresos</div>
        <div class="box-value" id="totalEgresos">0.00</div>
      </div>
      <div class="box">
        <div class="box-title">Saldo</div>
        <div class="box-value" id="saldoTotal">0.00</div>
      </div>
    </div>

    <div class="status" id="status">Cargando...</div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Cliente</th>
            <th>Proveedor</th>
            <th>Banco</th>
            <th>Concepto</th>
            <th>N° Operación</th>
            <th>Monto</th>
            <th>Observación</th>
          </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
      </table>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <h2 style="margin-top:0;font-size:18px;">Nuevo registro</h2>

      <form id="formRegistro">
        <div class="form-group">
          <label for="tipo">Tipo</label>
          <select id="tipo" name="tipo" required>
            <option value="Ingreso">Ingreso</option>
            <option value="Egreso">Egreso</option>
          </select>
        </div>

        <div class="form-group">
          <label for="cliente">Cliente</label>
          <input id="cliente" name="cliente" type="text" list="clientesListForm" autocomplete="off" required>
          <datalist id="clientesListForm"></datalist>
        </div>

        <div class="form-group" id="proveedorWrap">
          <label for="proveedor">Proveedor</label>
          <input id="proveedor" name="proveedor" type="text" list="proveedoresListForm" autocomplete="off">
          <datalist id="proveedoresListForm"></datalist>
        </div>

        <div class="form-group">
          <label for="banco">Banco</label>
          <select id="banco" name="banco" required>
            <option value="">Seleccionar</option>
            <option value="YAPE">YAPE</option>
            <option value="BBVA">BBVA</option>
            <option value="INTERBANK">INTERBANK</option>
            <option value="BCP">BCP</option>
          </select>
        </div>

        <div class="form-group">
          <label for="concepto">Concepto</label>
          <input id="concepto" name="concepto" type="text" required>
        </div>

        <div class="form-group">
          <label for="numeroOperacion">Número de operación</label>
          <input id="numeroOperacion" name="numeroOperacion" type="text" inputmode="numeric">
        </div>

        <div class="form-group">
          <label for="monto">Monto</label>
          <input id="monto" name="monto" type="number" step="0.01" inputmode="decimal" required>
        </div>

        <div class="form-group">
          <label for="observacion">Observación</label>
          <textarea id="observacion" name="observacion"></textarea>
        </div>

        <div class="hint">Se recordará el último tipo y banco usados.</div>

        <div class="actions">
          <button type="button" id="closeModalBtn">Cerrar</button>
          <button type="submit" id="saveBtn">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxvpNxDIAJKY5GQ2JcDacOGg9K3EwJlT9wvNZY00XB0L1q5EiFne_ha8wJDexsLMFHAxg/exec';
    const STORAGE_LAST_TIPO = 'registroPagos.lastTipo';
    const STORAGE_LAST_BANCO = 'registroPagos.lastBanco';

    const modal = document.getElementById('modal');
    const openModalBtn = document.getElementById('openModalBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const btnHoy = document.getElementById('btnHoy');
    const btn7Dias = document.getElementById('btn7Dias');
    const btnTodo = document.getElementById('btnTodo');

    const formRegistro = document.getElementById('formRegistro');
    const tablaBody = document.getElementById('tablaBody');
    const statusEl = document.getElementById('status');

    const clienteFiltro = document.getElementById('clienteFiltro');
    const tipoFiltro = document.getElementById('tipoFiltro');
    const fechaInicioFiltro = document.getElementById('fechaInicioFiltro');
    const fechaFinFiltro = document.getElementById('fechaFinFiltro');

    const tipoSelect = document.getElementById('tipo');
    const clienteInput = document.getElementById('cliente');
    const proveedorWrap = document.getElementById('proveedorWrap');
    const proveedorInput = document.getElementById('proveedor');
    const bancoSelect = document.getElementById('banco');
    const conceptoInput = document.getElementById('concepto');

    const totalIngresosEl = document.getElementById('totalIngresos');
    const totalEgresosEl = document.getElementById('totalEgresos');
    const saldoTotalEl = document.getElementById('saldoTotal');
    const saveBtn = document.getElementById('saveBtn');

    const clientesListFiltro = document.getElementById('clientesListFiltro');
    const clientesListForm = document.getElementById('clientesListForm');
    const proveedoresListForm = document.getElementById('proveedoresListForm');

    let registros = [];

    function normalizeText(value) {
      return String(value || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim()
        .toLowerCase();
    }

    function escapeHtml(value) {
      return String(value || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatMoney(value) {
      return Number(value || 0).toFixed(2);
    }

    function getTodayLocal() {
      const now = new Date();
      const offset = now.getTimezoneOffset();
      const local = new Date(now.getTime() - offset * 60000);
      return local.toISOString().slice(0, 10);
    }

    function addDays(dateString, days) {
      const date = new Date(dateString + 'T00:00:00');
      date.setDate(date.getDate() + days);
      const offset = date.getTimezoneOffset();
      const local = new Date(date.getTime() - offset * 60000);
      return local.toISOString().slice(0, 10);
    }

    function setFiltrosHoy() {
      const hoy = getTodayLocal();
      fechaInicioFiltro.value = hoy;
      fechaFinFiltro.value = hoy;
      updateView();
    }

    function setFiltros7Dias() {
      const hoy = getTodayLocal();
      fechaInicioFiltro.value = addDays(hoy, -6);
      fechaFinFiltro.value = hoy;
      updateView();
    }

    function setFiltrosTodo() {
      fechaInicioFiltro.value = '';
      fechaFinFiltro.value = '';
      updateView();
    }

    function normalizeRecord(record) {
      const fecha = String(record.fecha || '');
      return {
        fecha,
        fechaSolo: fecha.slice(0, 10),
        tipo: String(record.tipo || '').trim(),
        cliente: String(record.cliente || '').trim(),
        proveedor: String(record.proveedor || '').trim(),
        banco: String(record.banco || '').trim(),
        concepto: String(record.concepto || '').trim(),
        numeroOperacion: String(record.numeroOperacion || '').trim(),
        monto: Number(record.monto || 0),
        observacion: String(record.observacion || '').trim()
      };
    }

    function uniqueSorted(values) {
      const map = new Map();

      values.forEach(value => {
        const clean = String(value || '').trim();
        if (!clean) return;
        const key = normalizeText(clean);
        if (!map.has(key)) {
          map.set(key, clean);
        }
      });

      return Array.from(map.values()).sort((a, b) => a.localeCompare(b, 'es'));
    }

    function renderDatalist(datalistEl, values) {
      datalistEl.innerHTML = values.map(value => `<option value="${escapeHtml(value)}"></option>`).join('');
    }

    function updateCatalogs() {
      const clientes = uniqueSorted(registros.map(r => r.cliente));
      const proveedores = uniqueSorted(registros.map(r => r.proveedor));

      renderDatalist(clientesListFiltro, clientes);
      renderDatalist(clientesListForm, clientes);
      renderDatalist(proveedoresListForm, proveedores);
    }

    function toggleProveedor() {
      const esEgreso = tipoSelect.value === 'Egreso';
      proveedorWrap.style.display = esEgreso ? 'block' : 'none';
      if (!esEgreso) {
        proveedorInput.value = '';
      }
    }

    function savePreferences() {
      localStorage.setItem(STORAGE_LAST_TIPO, tipoSelect.value || 'Ingreso');
      localStorage.setItem(STORAGE_LAST_BANCO, bancoSelect.value || '');
    }

    function loadPreferences() {
      const lastTipo = localStorage.getItem(STORAGE_LAST_TIPO);
      const lastBanco = localStorage.getItem(STORAGE_LAST_BANCO);

      if (lastTipo) {
        tipoSelect.value = lastTipo;
      }

      if (lastBanco) {
        bancoSelect.value = lastBanco;
      }

      toggleProveedor();
    }

    function openModal() {
      modal.classList.add('show');
      loadPreferences();
      setTimeout(() => clienteInput.focus(), 50);
    }

    function closeModal() {
      modal.classList.remove('show');
      formRegistro.reset();
      loadPreferences();
    }

    function getRangoFechas() {
      let inicio = fechaInicioFiltro.value;
      let fin = fechaFinFiltro.value;

      if (inicio && fin && inicio > fin) {
        const temp = inicio;
        inicio = fin;
        fin = temp;
      }

      return { inicio, fin };
    }

    function getFilteredData() {
      const clienteBuscado = normalizeText(clienteFiltro.value);
      const tipo = tipoFiltro.value;
      const { inicio, fin } = getRangoFechas();

      return registros.filter(r => {
        const okCliente = !clienteBuscado || normalizeText(r.cliente).includes(clienteBuscado);
        const okTipo = !tipo || r.tipo === tipo;
        const okInicio = !inicio || r.fechaSolo >= inicio;
        const okFin = !fin || r.fechaSolo <= fin;
        return okCliente && okTipo && okInicio && okFin;
      });
    }

    function renderResumen(data) {
      const totalIngresos = data
        .filter(r => r.tipo === 'Ingreso')
        .reduce((acc, r) => acc + r.monto, 0);

      const totalEgresos = data
        .filter(r => r.tipo === 'Egreso')
        .reduce((acc, r) => acc + r.monto, 0);

      totalIngresosEl.textContent = formatMoney(totalIngresos);
      totalEgresosEl.textContent = formatMoney(totalEgresos);
      saldoTotalEl.textContent = formatMoney(totalIngresos - totalEgresos);
    }

    function renderTabla(data) {
      if (!data.length) {
        tablaBody.innerHTML = `
          <tr>
            <td colspan="9" class="empty-row">No hay registros</td>
          </tr>
        `;
        return;
      }

      const html = data.map(r => `
        <tr>
          <td data-label="Fecha">${escapeHtml(r.fecha)}</td>
          <td data-label="Tipo" class="${r.tipo === 'Ingreso' ? 'badge-ingreso' : 'badge-egreso'}">${escapeHtml(r.tipo)}</td>
          <td data-label="Cliente">${escapeHtml(r.cliente)}</td>
          <td data-label="Proveedor">${escapeHtml(r.proveedor)}</td>
          <td data-label="Banco">${escapeHtml(r.banco)}</td>
          <td data-label="Concepto">${escapeHtml(r.concepto)}</td>
          <td data-label="N° Operación">${escapeHtml(r.numeroOperacion)}</td>
          <td data-label="Monto">${formatMoney(r.monto)}</td>
          <td data-label="Observación">${escapeHtml(r.observacion)}</td>
        </tr>
      `).join('');

      tablaBody.innerHTML = html;
    }

    function updateView() {
      const data = getFilteredData();
      renderTabla(data);
      renderResumen(data);
    }

    async function cargarDatos() {
      statusEl.textContent = 'Cargando...';

      try {
        const res = await fetch(API_URL);
        const json = await res.json();

        if (!json.ok) {
          throw new Error(json.error || 'No se pudo cargar');
        }

        registros = (json.data || []).map(normalizeRecord).reverse();
        updateCatalogs();
        updateView();
        statusEl.textContent = '';
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Error al cargar datos';
      }
    }

    formRegistro.addEventListener('submit', async function (e) {
      e.preventDefault();

      saveBtn.disabled = true;
      saveBtn.textContent = 'Guardando...';

      try {
        const formData = new FormData(formRegistro);
        const body = new URLSearchParams(formData);

        const res = await fetch(API_URL, {
          method: 'POST',
          body
        });

        const json = await res.json();

        if (!json.ok) {
          alert(json.error || 'No se pudo guardar');
          return;
        }

        savePreferences();

        if (json.record) {
          registros.unshift(normalizeRecord(json.record));
          updateCatalogs();
          updateView();
        } else {
          await cargarDatos();
        }

        closeModal();
      } catch (error) {
        console.error(error);
        alert('Error al guardar');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Guardar';
      }
    });

    tipoSelect.addEventListener('change', () => {
      toggleProveedor();
      savePreferences();
    });

    bancoSelect.addEventListener('change', savePreferences);

    openModalBtn.addEventListener('click', openModal);
    closeModalBtn.addEventListener('click', closeModal);

    btnHoy.addEventListener('click', setFiltrosHoy);
    btn7Dias.addEventListener('click', setFiltros7Dias);
    btnTodo.addEventListener('click', setFiltrosTodo);

    clienteFiltro.addEventListener('input', updateView);
    tipoFiltro.addEventListener('change', updateView);
    fechaInicioFiltro.addEventListener('change', updateView);
    fechaFinFiltro.addEventListener('change', updateView);

    modal.addEventListener('click', function (e) {
      if (e.target === modal) {
        closeModal();
      }
    });

    setFiltrosHoy();
    loadPreferences();
    cargarDatos();
  </script>
</body>
</html>
