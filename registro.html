<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registro de Pagos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
      color: #222;
    }

    .wrap {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }

    .filters {
      display: grid;
      grid-template-columns: 140px 1fr 1fr 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
      align-items: end;
    }

    .filter-item label {
      display: block;
      font-size: 13px;
      color: #555;
      margin-bottom: 4px;
    }

    button, input, select, textarea {
      font-size: 16px;
      padding: 10px;
      box-sizing: border-box;
      width: 100%;
    }

    button {
      cursor: pointer;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .box {
      background: #fff;
      border: 1px solid #ddd;
      padding: 12px;
    }

    .box-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .box-value {
      font-size: 22px;
      font-weight: bold;
    }

    .status {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    .table-wrap {
      overflow-x: auto;
      background: #fff;
      border: 1px solid #ddd;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 950px;
    }

    th, td {
      border-bottom: 1px solid #e5e5e5;
      padding: 10px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #fafafa;
    }

    .badge-ingreso {
      color: green;
      font-weight: bold;
    }

    .badge-egreso {
      color: #b00020;
      font-weight: bold;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 460px;
      background: #fff;
      padding: 16px;
      border: 1px solid #ccc;
      max-height: 90vh;
      overflow-y: auto;
    }

    .form-group {
      margin-bottom: 10px;
    }

    .form-group label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 12px;
    }

    @media (max-width: 700px) {
      body {
        padding: 12px;
      }

      h1 {
        font-size: 20px;
      }

      .filters {
        grid-template-columns: 1fr;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
      }

      .table-wrap {
        overflow: visible;
        background: transparent;
        border: none;
      }

      table, tbody, tr, td {
        display: block;
        width: 100%;
      }

      table {
        min-width: 100%;
      }

      thead {
        display: none;
      }

      tr {
        background: #fff;
        border: 1px solid #ddd;
        margin-bottom: 12px;
        padding: 6px 0;
      }

      td {
        border: none;
        border-bottom: 1px solid #f0f0f0;
        padding: 8px 10px 8px 42%;
        position: relative;
        min-height: 20px;
        word-break: break-word;
      }

      td:last-child {
        border-bottom: none;
      }

      td::before {
        content: attr(data-label);
        position: absolute;
        left: 10px;
        top: 8px;
        width: 36%;
        font-weight: bold;
        color: #666;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Registro de Pagos</h1>

    <div class="filters">
      <div class="filter-item">
        <label>&nbsp;</label>
        <button id="openModalBtn" type="button">Agregar</button>
      </div>

      <div class="filter-item">
        <label for="clienteFiltro">Cliente</label>
        <select id="clienteFiltro">
          <option value="">Todos los clientes</option>
        </select>
      </div>

      <div class="filter-item">
        <label for="tipoFiltro">Tipo</label>
        <select id="tipoFiltro">
          <option value="">Todos los tipos</option>
          <option value="Ingreso">Ingreso</option>
          <option value="Egreso">Egreso</option>
        </select>
      </div>

      <div class="filter-item">
        <label for="fechaInicioFiltro">Fecha inicio</label>
        <input id="fechaInicioFiltro" type="date">
      </div>

      <div class="filter-item">
        <label for="fechaFinFiltro">Fecha fin</label>
        <input id="fechaFinFiltro" type="date">
      </div>
    </div>

    <div class="summary">
      <div class="box">
        <div class="box-title">Total ingresos</div>
        <div class="box-value" id="totalIngresos">0.00</div>
      </div>
      <div class="box">
        <div class="box-title">Total egresos</div>
        <div class="box-value" id="totalEgresos">0.00</div>
      </div>
      <div class="box">
        <div class="box-title">Saldo</div>
        <div class="box-value" id="saldoTotal">0.00</div>
      </div>
    </div>

    <div class="status" id="status">Cargando...</div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Cliente</th>
            <th>Proveedor</th>
            <th>Banco</th>
            <th>Concepto</th>
            <th>N° Operación</th>
            <th>Monto</th>
            <th>Observación</th>
          </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
      </table>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <h2 style="margin-top:0;font-size:18px;">Nuevo registro</h2>

      <form id="formRegistro">
        <div class="form-group">
          <label for="tipo">Tipo</label>
          <select id="tipo" name="tipo" required>
            <option value="Ingreso">Ingreso</option>
            <option value="Egreso">Egreso</option>
          </select>
        </div>

        <div class="form-group">
          <label for="cliente">Cliente</label>
          <input id="cliente" name="cliente" type="text" required>
        </div>

        <div class="form-group" id="proveedorWrap">
          <label for="proveedor">Proveedor</label>
          <input id="proveedor" name="proveedor" type="text">
        </div>

        <div class="form-group">
          <label for="banco">Banco</label>
          <select id="banco" name="banco" required>
            <option value="">Seleccionar</option>
            <option value="YAPE">YAPE</option>
            <option value="BBVA">BBVA</option>
            <option value="INTERBANK">INTERBANK</option>
            <option value="BCP">BCP</option>
          </select>
        </div>

        <div class="form-group">
          <label for="concepto">Concepto</label>
          <input id="concepto" name="concepto" type="text" required>
        </div>

        <div class="form-group">
          <label for="numeroOperacion">Número de operación</label>
          <input id="numeroOperacion" name="numeroOperacion" type="text">
        </div>

        <div class="form-group">
          <label for="monto">Monto</label>
          <input id="monto" name="monto" type="number" step="0.01" required>
        </div>

        <div class="form-group">
          <label for="observacion">Observación</label>
          <textarea id="observacion" name="observacion"></textarea>
        </div>

        <div class="actions">
          <button type="button" id="closeModalBtn">Cerrar</button>
          <button type="submit" id="saveBtn">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbznnKZNXp-0hyW-YA_WKogh_m2JLahppqTYJctsrMju6yCEWYvyfggx77ITTKHVB_wASg/exec';

    const modal = document.getElementById('modal');
    const openModalBtn = document.getElementById('openModalBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const formRegistro = document.getElementById('formRegistro');
    const tablaBody = document.getElementById('tablaBody');
    const statusEl = document.getElementById('status');
    const clienteFiltro = document.getElementById('clienteFiltro');
    const tipoFiltro = document.getElementById('tipoFiltro');
    const fechaInicioFiltro = document.getElementById('fechaInicioFiltro');
    const fechaFinFiltro = document.getElementById('fechaFinFiltro');
    const tipoSelect = document.getElementById('tipo');
    const proveedorWrap = document.getElementById('proveedorWrap');
    const proveedorInput = document.getElementById('proveedor');
    const totalIngresosEl = document.getElementById('totalIngresos');
    const totalEgresosEl = document.getElementById('totalEgresos');
    const saldoTotalEl = document.getElementById('saldoTotal');
    const saveBtn = document.getElementById('saveBtn');

    let registros = [];

    function getTodayLocal() {
      const now = new Date();
      const offset = now.getTimezoneOffset();
      const local = new Date(now.getTime() - offset * 60000);
      return local.toISOString().slice(0, 10);
    }

    function setFiltrosHoy() {
      const hoy = getTodayLocal();
      fechaInicioFiltro.value = hoy;
      fechaFinFiltro.value = hoy;
    }

    function getFechaSolo(fechaTexto) {
      return String(fechaTexto || '').slice(0, 10);
    }

    function openModal() {
      modal.classList.add('show');
    }

    function closeModal() {
      modal.classList.remove('show');
      formRegistro.reset();
      tipoSelect.value = 'Ingreso';
      toggleProveedor();
    }

    function toggleProveedor() {
      const esEgreso = tipoSelect.value === 'Egreso';
      proveedorWrap.style.display = esEgreso ? 'block' : 'none';
      if (!esEgreso) proveedorInput.value = '';
    }

    function getRangoFechas() {
      let inicio = fechaInicioFiltro.value;
      let fin = fechaFinFiltro.value;

      if (inicio && fin && inicio > fin) {
        const temp = inicio;
        inicio = fin;
        fin = temp;
      }

      return { inicio, fin };
    }

    function getFilteredData() {
      const cliente = clienteFiltro.value;
      const tipo = tipoFiltro.value;
      const { inicio, fin } = getRangoFechas();

      return registros.filter(r => {
        const fechaRegistro = getFechaSolo(r.fecha);
        const okCliente = !cliente || r.cliente === cliente;
        const okTipo = !tipo || r.tipo === tipo;
        const okInicio = !inicio || fechaRegistro >= inicio;
        const okFin = !fin || fechaRegistro <= fin;

        return okCliente && okTipo && okInicio && okFin;
      });
    }

    function renderFiltroClientes() {
      const clientes = [...new Set(registros.map(r => (r.cliente || '').trim()).filter(Boolean))]
        .sort((a, b) => a.localeCompare(b, 'es'));

      const actual = clienteFiltro.value;
      clienteFiltro.innerHTML = '<option value="">Todos los clientes</option>';

      clientes.forEach(cliente => {
        const option = document.createElement('option');
        option.value = cliente;
        option.textContent = cliente;
        clienteFiltro.appendChild(option);
      });

      clienteFiltro.value = clientes.includes(actual) ? actual : '';
    }

    function renderResumen() {
      const data = getFilteredData();

      const totalIngresos = data
        .filter(r => r.tipo === 'Ingreso')
        .reduce((acc, r) => acc + Number(r.monto || 0), 0);

      const totalEgresos = data
        .filter(r => r.tipo === 'Egreso')
        .reduce((acc, r) => acc + Number(r.monto || 0), 0);

      const saldo = totalIngresos - totalEgresos;

      totalIngresosEl.textContent = totalIngresos.toFixed(2);
      totalEgresosEl.textContent = totalEgresos.toFixed(2);
      saldoTotalEl.textContent = saldo.toFixed(2);
    }

    function renderTabla() {
      const data = getFilteredData();

      tablaBody.innerHTML = '';

      if (data.length === 0) {
        tablaBody.innerHTML = '<tr><td colspan="9">No hay registros</td></tr>';
        renderResumen();
        return;
      }

      data.forEach(r => {
        const tr = document.createElement('tr');

        tr.innerHTML = `
          <td data-label="Fecha">${escapeHtml(r.fecha || '')}</td>
          <td data-label="Tipo" class="${r.tipo === 'Ingreso' ? 'badge-ingreso' : 'badge-egreso'}">${escapeHtml(r.tipo || '')}</td>
          <td data-label="Cliente">${escapeHtml(r.cliente || '')}</td>
          <td data-label="Proveedor">${escapeHtml(r.proveedor || '')}</td>
          <td data-label="Banco">${escapeHtml(r.banco || '')}</td>
          <td data-label="Concepto">${escapeHtml(r.concepto || '')}</td>
          <td data-label="N° Operación">${escapeHtml(r.numeroOperacion || '')}</td>
          <td data-label="Monto">${Number(r.monto || 0).toFixed(2)}</td>
          <td data-label="Observación">${escapeHtml(r.observacion || '')}</td>
        `;

        tablaBody.appendChild(tr);
      });

      renderResumen();
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    async function cargarDatos() {
      statusEl.textContent = 'Cargando...';

      try {
        const res = await fetch(API_URL);
        const json = await res.json();

        registros = (json.data || []).slice().reverse();
        renderFiltroClientes();
        renderTabla();
        statusEl.textContent = '';
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Error al cargar datos';
      }
    }

    formRegistro.addEventListener('submit', async function (e) {
      e.preventDefault();

      saveBtn.disabled = true;
      saveBtn.textContent = 'Guardando...';

      try {
        const formData = new FormData(formRegistro);
        const body = new URLSearchParams(formData);

        const res = await fetch(API_URL, {
          method: 'POST',
          body
        });

        const json = await res.json();

        if (!json.ok) {
          alert(json.error || 'No se pudo guardar');
          return;
        }

        closeModal();
        await cargarDatos();
      } catch (error) {
        console.error(error);
        alert('Error al guardar');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Guardar';
      }
    });

    openModalBtn.addEventListener('click', openModal);
    closeModalBtn.addEventListener('click', closeModal);
    clienteFiltro.addEventListener('change', renderTabla);
    tipoFiltro.addEventListener('change', renderTabla);
    fechaInicioFiltro.addEventListener('change', renderTabla);
    fechaFinFiltro.addEventListener('change', renderTabla);
    tipoSelect.addEventListener('change', toggleProveedor);

    modal.addEventListener('click', function (e) {
      if (e.target === modal) closeModal();
    });

    setFiltrosHoy();
    toggleProveedor();
    cargarDatos();
  </script>
</body>
</html>
