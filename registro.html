<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Registro de Pagos</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 16px;
      background: #f5f5f5;
      color: #222;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }

    .topbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    button, input, select, textarea {
      font-size: 16px;
      padding: 10px;
      box-sizing: border-box;
    }

    button {
      cursor: pointer;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .box {
      background: #fff;
      border: 1px solid #ddd;
      padding: 12px;
    }

    .box-title {
      font-size: 13px;
      color: #666;
      margin-bottom: 6px;
    }

    .box-value {
      font-size: 22px;
      font-weight: bold;
    }

    .table-wrap {
      overflow-x: auto;
      background: #fff;
      border: 1px solid #ddd;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1000px;
    }

    th, td {
      border-bottom: 1px solid #e5e5e5;
      padding: 10px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #fafafa;
    }

    .badge-ingreso {
      color: green;
      font-weight: bold;
    }

    .badge-egreso {
      color: #b00020;
      font-weight: bold;
    }

    .status {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.4);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 1000;
    }

    .modal.show {
      display: flex;
    }

    .modal-box {
      width: 100%;
      max-width: 480px;
      background: #fff;
      padding: 16px;
      border: 1px solid #ccc;
      max-height: 92vh;
      overflow-y: auto;
    }

    .form-group {
      margin-bottom: 10px;
    }

    .form-group label {
      display: block;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
    }

    textarea {
      min-height: 70px;
      resize: vertical;
    }

    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 12px;
    }

    .autocomplete {
      position: relative;
      flex: 1 1 240px;
      min-width: 220px;
    }

    .autocomplete.full {
      width: 100%;
      min-width: 100%;
    }

    .autocomplete input {
      width: 100%;
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 2px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid #ccc;
      max-height: 220px;
      overflow-y: auto;
      z-index: 1200;
      display: none;
    }

    .suggestions.show {
      display: block;
    }

    .suggestion-item {
      padding: 10px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
      font-size: 14px;
      background: #fff;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover,
    .suggestion-item.active {
      background: #f0f0f0;
    }

    .helper {
      font-size: 12px;
      color: #666;
      margin-top: 4px;
    }

    @media (max-width: 700px) {
      .topbar {
        flex-direction: column;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      button, input, select, textarea {
        width: 100%;
      }

      .autocomplete {
        min-width: 100%;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Registro de Pagos</h1>

    <div class="topbar">
      <button id="openModalBtn" type="button">Agregar</button>

      <div class="autocomplete">
        <input
          id="clienteFiltro"
          type="text"
          placeholder="Buscar por cliente"
          autocomplete="off"
        >
        <div id="clienteFiltroSuggestions" class="suggestions"></div>
      </div>

      <select id="tipoFiltro">
        <option value="">Todos los tipos</option>
        <option value="Ingreso">Ingreso</option>
        <option value="Egreso">Egreso</option>
      </select>
    </div>

    <div class="summary">
      <div class="box">
        <div class="box-title">Total ingresos</div>
        <div class="box-value" id="totalIngresos">0.00</div>
      </div>
      <div class="box">
        <div class="box-title">Total egresos</div>
        <div class="box-value" id="totalEgresos">0.00</div>
      </div>
      <div class="box">
        <div class="box-title">Saldo</div>
        <div class="box-value" id="saldoTotal">0.00</div>
      </div>
    </div>

    <div class="status" id="status">Cargando...</div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Tipo</th>
            <th>Cliente</th>
            <th>Proveedor</th>
            <th>Banco</th>
            <th>Concepto</th>
            <th>N° Operación</th>
            <th>Monto</th>
            <th>Observación</th>
          </tr>
        </thead>
        <tbody id="tablaBody"></tbody>
      </table>
    </div>
  </div>

  <div class="modal" id="modal">
    <div class="modal-box">
      <h2 style="margin-top:0;font-size:18px;">Nuevo registro</h2>

      <form id="formRegistro">
        <div class="form-group">
          <label for="tipo">Tipo</label>
          <select id="tipo" name="tipo" required>
            <option value="Ingreso">Ingreso</option>
            <option value="Egreso">Egreso</option>
          </select>
        </div>

        <div class="form-group">
          <label for="cliente">Cliente</label>
          <div class="autocomplete full">
            <input id="cliente" name="cliente" type="text" required autocomplete="off">
            <div id="clienteSuggestions" class="suggestions"></div>
          </div>
          <div class="helper">Puedes elegir uno existente o escribir uno nuevo.</div>
        </div>

        <div class="form-group" id="proveedorWrap">
          <label for="proveedor">Proveedor</label>
          <div class="autocomplete full">
            <input id="proveedor" name="proveedor" type="text" autocomplete="off">
            <div id="proveedorSuggestions" class="suggestions"></div>
          </div>
          <div class="helper">Solo obligatorio para egresos.</div>
        </div>

        <div class="form-group">
          <label for="banco">Banco</label>
          <select id="banco" name="banco" required>
            <option value="">Seleccionar</option>
            <option value="YAPE">YAPE</option>
            <option value="BBVA">BBVA</option>
            <option value="INTERBANK">INTERBANK</option>
            <option value="BCP">BCP</option>
          </select>
        </div>

        <div class="form-group">
          <label for="concepto">Concepto</label>
          <input id="concepto" name="concepto" type="text" required>
        </div>

        <div class="form-group">
          <label for="numeroOperacion">Número de operación</label>
          <input id="numeroOperacion" name="numeroOperacion" type="text">
        </div>

        <div class="form-group">
          <label for="monto">Monto</label>
          <input id="monto" name="monto" type="number" step="0.01" required>
        </div>

        <div class="form-group">
          <label for="observacion">Observación</label>
          <textarea id="observacion" name="observacion"></textarea>
        </div>

        <div class="actions">
          <button type="button" id="closeModalBtn">Cerrar</button>
          <button type="submit" id="saveBtn">Guardar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbznnKZNXp-0hyW-YA_WKogh_m2JLahppqTYJctsrMju6yCEWYvyfggx77ITTKHVB_wASg/exec';

    const modal = document.getElementById('modal');
    const openModalBtn = document.getElementById('openModalBtn');
    const closeModalBtn = document.getElementById('closeModalBtn');
    const formRegistro = document.getElementById('formRegistro');
    const tablaBody = document.getElementById('tablaBody');
    const statusEl = document.getElementById('status');
    const clienteFiltro = document.getElementById('clienteFiltro');
    const tipoFiltro = document.getElementById('tipoFiltro');
    const tipoSelect = document.getElementById('tipo');
    const proveedorWrap = document.getElementById('proveedorWrap');
    const proveedorInput = document.getElementById('proveedor');
    const clienteInput = document.getElementById('cliente');
    const totalIngresosEl = document.getElementById('totalIngresos');
    const totalEgresosEl = document.getElementById('totalEgresos');
    const saldoTotalEl = document.getElementById('saldoTotal');
    const saveBtn = document.getElementById('saveBtn');

    const clienteFiltroSuggestions = document.getElementById('clienteFiltroSuggestions');
    const clienteSuggestions = document.getElementById('clienteSuggestions');
    const proveedorSuggestions = document.getElementById('proveedorSuggestions');

    let registros = [];
    let clientesUnicos = [];
    let proveedoresUnicos = [];

    function normalizeText(text) {
      return String(text || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .trim()
        .toLowerCase();
    }

    function uniqueSorted(list) {
      const seen = new Map();

      list.forEach(item => {
        const clean = String(item || '').trim();
        if (!clean) return;
        const key = normalizeText(clean);
        if (!seen.has(key)) {
          seen.set(key, clean);
        }
      });

      return Array.from(seen.values()).sort((a, b) => a.localeCompare(b, 'es'));
    }

    function extractCatalogs() {
      clientesUnicos = uniqueSorted(registros.map(r => r.cliente));
      proveedoresUnicos = uniqueSorted(registros.map(r => r.proveedor));
    }

    function openModal() {
      modal.classList.add('show');
      setTimeout(() => clienteInput.focus(), 50);
    }

    function closeModal() {
      modal.classList.remove('show');
      formRegistro.reset();
      tipoSelect.value = 'Ingreso';
      toggleProveedor();
      closeAllSuggestions();
    }

    function toggleProveedor() {
      const esEgreso = tipoSelect.value === 'Egreso';
      proveedorWrap.style.display = esEgreso ? 'block' : 'none';
      if (!esEgreso) proveedorInput.value = '';
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function formatMoney(value) {
      return Number(value || 0).toFixed(2);
    }

    function getFilteredData() {
      const clienteTexto = normalizeText(clienteFiltro.value);
      const tipo = tipoFiltro.value;

      return registros.filter(r => {
        const clienteRegistro = normalizeText(r.cliente);
        const okCliente = !clienteTexto || clienteRegistro.includes(clienteTexto);
        const okTipo = !tipo || r.tipo === tipo;
        return okCliente && okTipo;
      });
    }

    function renderResumen() {
      const data = getFilteredData();

      const totalIngresos = data
        .filter(r => r.tipo === 'Ingreso')
        .reduce((acc, r) => acc + Number(r.monto || 0), 0);

      const totalEgresos = data
        .filter(r => r.tipo === 'Egreso')
        .reduce((acc, r) => acc + Number(r.monto || 0), 0);

      const saldo = totalIngresos - totalEgresos;

      totalIngresosEl.textContent = formatMoney(totalIngresos);
      totalEgresosEl.textContent = formatMoney(totalEgresos);
      saldoTotalEl.textContent = formatMoney(saldo);
    }

    function renderTabla() {
      const data = getFilteredData();
      tablaBody.innerHTML = '';

      if (!data.length) {
        tablaBody.innerHTML = '<tr><td colspan="9">No hay registros</td></tr>';
        renderResumen();
        return;
      }

      data.forEach(r => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${escapeHtml(r.fecha || '')}</td>
          <td class="${r.tipo === 'Ingreso' ? 'badge-ingreso' : 'badge-egreso'}">${escapeHtml(r.tipo || '')}</td>
          <td>${escapeHtml(r.cliente || '')}</td>
          <td>${escapeHtml(r.proveedor || '')}</td>
          <td>${escapeHtml(r.banco || '')}</td>
          <td>${escapeHtml(r.concepto || '')}</td>
          <td>${escapeHtml(r.numeroOperacion || '')}</td>
          <td>${formatMoney(r.monto)}</td>
          <td>${escapeHtml(r.observacion || '')}</td>
        `;
        tablaBody.appendChild(tr);
      });

      renderResumen();
    }

    function closeSuggestions(box) {
      if (box) {
        box.classList.remove('show');
        box.innerHTML = '';
      }
    }

    function closeAllSuggestions() {
      closeSuggestions(clienteFiltroSuggestions);
      closeSuggestions(clienteSuggestions);
      closeSuggestions(proveedorSuggestions);
    }

    function renderSuggestionBox(inputEl, boxEl, items, onSelect) {
      const query = normalizeText(inputEl.value);
      boxEl.innerHTML = '';

      if (!items.length) {
        closeSuggestions(boxEl);
        return;
      }

      const matches = items
        .filter(item => normalizeText(item).includes(query))
        .slice(0, 8);

      if (!matches.length) {
        closeSuggestions(boxEl);
        return;
      }

      matches.forEach(item => {
        const div = document.createElement('div');
        div.className = 'suggestion-item';
        div.textContent = item;
        div.addEventListener('click', () => {
          onSelect(item);
          closeSuggestions(boxEl);
        });
        boxEl.appendChild(div);
      });

      boxEl.classList.add('show');
    }

    function setupAutocomplete(inputEl, boxEl, sourceGetter, onSelectExtra) {
      inputEl.addEventListener('input', () => {
        renderSuggestionBox(inputEl, boxEl, sourceGetter(), selected => {
          inputEl.value = selected;
          if (onSelectExtra) onSelectExtra(selected);
          renderTabla();
        });

        if (inputEl === clienteFiltro) {
          renderTabla();
        }
      });

      inputEl.addEventListener('focus', () => {
        renderSuggestionBox(inputEl, boxEl, sourceGetter(), selected => {
          inputEl.value = selected;
          if (onSelectExtra) onSelectExtra(selected);
          renderTabla();
        });
      });

      inputEl.addEventListener('keydown', (e) => {
        const items = Array.from(boxEl.querySelectorAll('.suggestion-item'));
        const active = boxEl.querySelector('.suggestion-item.active');
        let index = items.indexOf(active);

        if (!boxEl.classList.contains('show') || !items.length) return;

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          index = index < items.length - 1 ? index + 1 : 0;
          items.forEach(item => item.classList.remove('active'));
          items[index].classList.add('active');
        }

        if (e.key === 'ArrowUp') {
          e.preventDefault();
          index = index > 0 ? index - 1 : items.length - 1;
          items.forEach(item => item.classList.remove('active'));
          items[index].classList.add('active');
        }

        if (e.key === 'Enter' && active) {
          e.preventDefault();
          active.click();
        }

        if (e.key === 'Escape') {
          closeSuggestions(boxEl);
        }
      });
    }

    async function cargarDatos() {
      statusEl.textContent = 'Cargando...';

      try {
        const res = await fetch(API_URL);
        const json = await res.json();

        registros = (json.data || []).slice().reverse();
        extractCatalogs();
        renderTabla();
        statusEl.textContent = '';
      } catch (error) {
        console.error(error);
        statusEl.textContent = 'Error al cargar datos';
      }
    }

    formRegistro.addEventListener('submit', async function (e) {
      e.preventDefault();

      saveBtn.disabled = true;
      saveBtn.textContent = 'Guardando...';

      try {
        const formData = new FormData(formRegistro);
        const body = new URLSearchParams(formData);

        const res = await fetch(API_URL, {
          method: 'POST',
          body
        });

        const json = await res.json();

        if (!json.ok) {
          alert(json.error || 'No se pudo guardar');
          return;
        }

        closeModal();
        await cargarDatos();
      } catch (error) {
        console.error(error);
        alert('Error al guardar');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Guardar';
      }
    });

    openModalBtn.addEventListener('click', openModal);
    closeModalBtn.addEventListener('click', closeModal);
    tipoFiltro.addEventListener('change', renderTabla);
    tipoSelect.addEventListener('change', toggleProveedor);

    modal.addEventListener('click', function (e) {
      if (e.target === modal) closeModal();
    });

    document.addEventListener('click', function (e) {
      const insideAutocomplete = e.target.closest('.autocomplete');
      if (!insideAutocomplete) {
        closeAllSuggestions();
      }
    });

    setupAutocomplete(
      clienteFiltro,
      clienteFiltroSuggestions,
      () => clientesUnicos
    );

    setupAutocomplete(
      clienteInput,
      clienteSuggestions,
      () => clientesUnicos
    );

    setupAutocomplete(
      proveedorInput,
      proveedorSuggestions,
      () => proveedoresUnicos
    );

    toggleProveedor();
    cargarDatos();
  </script>
</body>
</html>
